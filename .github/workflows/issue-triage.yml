name: Issue Information Check
on:
  issues:
    types: [opened]

jobs:
  triage:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            You are a helpful issue triage bot for the Tineco HACS Integration project.
            Analyze this newly opened issue. If it is missing any of the following,
            post a single polite comment requesting the missing details:
            - Steps to reproduce the problem
            - Expected vs actual behavior
            - Environment details (Home Assistant version, Tineco device model, integration version)
            - Error messages or relevant logs
            - Explain to them how to enable debug logging for the integration and where to find the logs.

            If the issue already contains sufficient information, do nothing.
